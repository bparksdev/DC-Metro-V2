        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            //console.log('DOM loaded, initializing app...');
            initializeApp();
        });

        function initializeApp() {
            updateViewportLayout();
            updateDisplayModeButtonText();
            loadFavorites();
            populateStations();
            renderFavorites();
            updateAddFavoriteButton();
            updateDateTime();
            showDisplay();
            setupEventListeners();
            
            // Set up auto-refresh every 60 seconds
            appState.updateInterval = setInterval(showDisplay, 60000);
            // Update datetime every second
            setInterval(updateDateTime, 1000);
            //console.log('App initialized successfully');
        }

        function setupEventListeners() {
            window.addEventListener('resize', updateViewportLayout);
            window.addEventListener('orientationchange', updateViewportLayout);

            // Menu button
            const menuBtn = document.getElementById('menuButton');
            if (menuBtn) {
                menuBtn.addEventListener('click', toggleMenu);
            }

            // Display toggle button
            const displayBtn = document.getElementById('displayToggleBtn');
            if (displayBtn) {
                displayBtn.addEventListener('click', toggleDisplay);
            }

            // Station selector
            const stationSelect = document.getElementById('stations');
            if (stationSelect) {
                stationSelect.addEventListener('change', changeStation);
            }

            // Add favorite button (main)
            const addFavBtnMain = document.getElementById('addFavoriteBtnMain');
            if (addFavBtnMain) {
                addFavBtnMain.addEventListener('click', addFavorite);
            }

            // Incidents button (main)
            const showIncidentsBtnMain = document.getElementById('showIncidentsBtnMain');
            if (showIncidentsBtnMain) {
                showIncidentsBtnMain.addEventListener('click', openIncidentsModal);
            }

            // Incidents modal close button
            const closeIncidentsModalBtn = document.getElementById('closeIncidentsModalBtn');
            if (closeIncidentsModalBtn) {
                closeIncidentsModalBtn.addEventListener('click', closeIncidentsModal);
            }

            // Close modal when clicking overlay
            const incidentsModal = document.getElementById('incidentsModal');
            if (incidentsModal) {
                incidentsModal.addEventListener('click', function(event) {
                    if (event.target === incidentsModal) {
                        closeIncidentsModal();
                    }
                });
            }

            // Close menu when clicking outside
            document.addEventListener('click', function(event) {
                const menu = document.getElementById('hamburgerMenu');
                const dropdown = document.getElementById('menuDropdown');
                
                if (menu && dropdown && !menu.contains(event.target)) {
                    dropdown.style.display = 'none';
                }
            });

            //console.log('Event listeners set up');
        }

        function updateViewportLayout() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);

            const isPortrait = window.innerHeight >= window.innerWidth;
            document.body.setAttribute('data-portrait', isPortrait ? 'true' : 'false');
        }

        function toggleMenu() {
            const dropdown = document.getElementById('menuDropdown');
            if (dropdown) {
                const isVisible = dropdown.style.display === 'block';
                dropdown.style.display = isVisible ? 'none' : 'block';
                //console.log('Menu toggled:', dropdown.style.display);
            }
        }

        function toggleDisplay() {
            //console.log('Toggle display called: ' + document.body.classList.contains('station-display'));
            
            appState.isStationDisplay = !appState.isStationDisplay;
            ////console.log(appState)
            
            if (document.body) {
                document.body.className = appState.isStationDisplay ? 'station-display' : 'app-display';
            }

            updateDisplayModeButtonText();
            
            // Close menu
            const dropdown = document.getElementById('menuDropdown');
            if (dropdown) {
                dropdown.style.display = 'none';
            }
            showDisplay();
            //console.log('Display mode:', appState.isStationDisplay ? 'Station' : 'App');
        }

        function updateDisplayModeButtonText() {
            const displayModeText = document.getElementById('displayModeText');
            if (!displayModeText) return;

            displayModeText.textContent = appState.isStationDisplay
                ? 'Switch to App Mode'
                : 'Switch to Station Mode';
        }

        function populateStations() {
            const stationSelect = document.getElementById('stations');
            if (!stationSelect) return;
            
            const sortedStations = [...stations].sort((a, b) => a.name.localeCompare(b.name));
            
            // Clear and repopulate
            stationSelect.innerHTML = '<option value="">Select a station</option>';
            
            sortedStations.forEach(station => {
                const option = document.createElement('option');
                option.value = station.code;
                option.textContent = station.name;
                stationSelect.appendChild(option);
            });
        }

        function changeStation() {
            const stationSelect = document.getElementById('stations');
            if (!stationSelect || !stationSelect.value) return;
            
            const selectedCode = stationSelect.value;
            const selectedName = stationSelect.options[stationSelect.selectedIndex].text;
            
            appState.currentStationCode = selectedCode;
            appState.currentStationName = selectedName;
            
            updateAddFavoriteButton();
            showDisplay();
            
            // Close menu
            const dropdown = document.getElementById('menuDropdown');
            if (dropdown) {
                dropdown.style.display = 'none';
            }
            
            //console.log('Station changed to:', selectedName);
        }

        function objectToQueryString(obj) {
            return Object.keys(obj)
                .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(obj[key]))
                .join('&');
        }

        function showDisplay() { 
            var params = {
                "api_key": "5f4edc894c164d6daefa973fb3cbdfdd",
            };

            var stationCode = arguments.length ? arguments[0] : appState.currentStationCode;

            fetch(`https://api.wmata.com/StationPrediction.svc/json/GetPrediction/${stationCode}?${objectToQueryString(params)}`, {
                method: 'GET'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                //app-display
                ////console.log(document.body.classList.contains('app-display'))
                if(appState.isStationDisplay) {
                    var output = "<table cellspacing=0 cellpadding=0><tr><td class='headers'>LN</td><td class='headers'>CAR</td><td class='headers'>DEST</td><td class='headers'>MIN</td></tr>";
                        for(let i = 0; i < data.Trains.length; i++) {
                            output += '<tr><td>' + data.Trains[i]['Line'] + '</td><td>' + data.Trains[i]['Car'] + '</td><td>' + data.Trains[i]['DestinationName'] + '</td><td>' + data.Trains[i]['Min'] + "</td></tr>";
                        }

                } else {
                    var output = "<table cellspacing=0 cellpadding=0><tr><td class='headers'>Line</td><td class='headers'>Cars</td><td class='headers'>Destination</td><td class='headers'>Minutes</td></tr>";
                        for(let i = 0; i < data.Trains.length; i++) {
                            const lineColor = `line-${data.Trains[i].Line}`;
                            // output += '<tr><td>' + data.Trains[i]['Line'] + '</td><td>' + data.Trains[i]['Car'] + '</td><td>' + data.Trains[i]['DestinationName'] + '</td><td>' + data.Trains[i]['Min'] + "</td></tr>";
                            output += `<tr>
                                <td><span class="line-color ${lineColor}"></span>${data.Trains[i]['Line']}</td>
                                <td>${data.Trains[i]['Car']}</td>
                                <td>${data.Trains[i]['DestinationName']}</td>
                                <td>${data.Trains[i]['Min']}</td>
                            </tr>`;                    
                        }
                }
                output += '</table>';
                document.getElementById("trains").innerHTML = output;
                document.getElementById("currentStation").innerHTML = appState.currentStationName;
            })
            .catch(error => {
                const output = "<table cellspacing=0 cellpadding=0><tr><th>LN</th><th>CAR</th><th>DEST</th><th>MIN</th></tr></table><p>Train data is not available</p>";
                document.getElementById("trains").innerHTML = output;
            });
        }

        // Favorites management functions
        function loadFavorites() {
            const saved = localStorage.getItem('wmataFavoriteStations');
            if (saved) {
                try {
                    appState.favoriteStations = JSON.parse(saved);
                } catch (e) {
                    appState.favoriteStations = [];
                }
            }
        }

        function saveFavorites() {
            localStorage.setItem('wmataFavoriteStations', JSON.stringify(appState.favoriteStations));
        }

        function addFavorite() {
            if (!appState.currentStationCode || !appState.currentStationName) {
                alert('Please select a station first');
                return;
            }

            const exists = appState.favoriteStations.some(fav => fav.code === appState.currentStationCode);
            if (exists) {
                alert('This station is already in your favorites');
                return;
            }

            appState.favoriteStations.push({
                code: appState.currentStationCode,
                name: appState.currentStationName
            });

            saveFavorites();
            renderFavorites();
            updateAddFavoriteButton();
        }

        function deleteFavorite(code) {
            appState.favoriteStations = appState.favoriteStations.filter(fav => fav.code !== code);
            saveFavorites();
            renderFavorites();
            updateAddFavoriteButton();
        }

        function selectFavorite(code, name) {
            appState.currentStationCode = code;
            appState.currentStationName = name;

            const stationSelect = document.getElementById('stations');
            if (stationSelect) {
                stationSelect.value = code;
            }

            showDisplay();
            updateAddFavoriteButton();

            // Close menu
            const dropdown = document.getElementById('menuDropdown');
            if (dropdown) {
                dropdown.style.display = 'none';
            }
        }

        function renderFavorites() {
            const container = document.getElementById('favoriteStationsList');
            if (!container) return;

            if (appState.favoriteStations.length === 0) {
                container.innerHTML = '<div class="no-favorites-msg">No saved stations</div>';
                return;
            }

            let html = '';
            appState.favoriteStations.forEach(fav => {
                html += `
                    <div class="favorite-station-item">
                        <span class="favorite-station-name" onclick="selectFavorite('${fav.code}', '${fav.name.replace(/'/g, "\\'")}')">${fav.name}</span>
                        <button class="delete-favorite-btn" onclick="deleteFavorite('${fav.code}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function updateAddFavoriteButton() {
            const btn = document.getElementById('addFavoriteBtnMain');
            if (!btn) return;

            const exists = appState.favoriteStations.some(fav => fav.code === appState.currentStationCode);
            btn.disabled = exists || !appState.currentStationCode;
            
            if (exists) {
                btn.innerHTML = '<i class="fas fa-star"></i> Already Saved';
            } else {
                btn.innerHTML = '<i class="fas fa-star"></i> Save Current Station';
            }
        }

            const modal = document.getElementById('incidentsModal');
            if (!modal) return;

            modal.style.display = 'flex';
            modal.setAttribute('aria-hidden', 'false');

        }

        function closeIncidentsModal() {
            const modal = document.getElementById('incidentsModal');
            if (!modal) return;

            modal.style.display = 'none';
            modal.setAttribute('aria-hidden', 'true');
        }

        function normalizeText(text) {
            return String(text || '').toLowerCase().trim();
        }

        function baseStationName(stationName) {
            return String(stationName || '').replace(/\s*\([^)]*\)\s*/g, '').trim();
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function matchesStationText(value, stationName) {
            const candidate = normalizeText(value);
            const baseName = normalizeText(baseStationName(stationName));
            return Boolean(candidate && baseName && candidate.includes(baseName));
        }

        function incidentMatchesStation(incident, stationCode, stationName) {
            const code = normalizeText(stationCode);
            const codeCandidates = [incident.StationCode, incident.StationCode1, incident.StationCode2]
                .filter(Boolean)
                .map(normalizeText);

            if (code && codeCandidates.includes(code)) {
                return true;
            }

            const textFields = [
                incident.Description,
                incident.IncidentType,
                incident.LocationDescription,
                incident.StationName,
                incident.UnitName,
                incident.SymptomDescription,
                incident.LinesAffected
            ];

            return textFields.some(field => matchesStationText(field, stationName));
        }

        function renderRailIncidents(incidents) {
            if (!incidents.length) {
                return '<div class="modal-empty">No active rail incidents for this station.</div>';
            }

            return incidents.map(incident => {
                const title = escapeHtml(incident.IncidentType || 'Rail Incident');
                const description = escapeHtml(incident.Description || 'No additional details.');
                const lines = escapeHtml(incident.LinesAffected || 'N/A');
                const updated = escapeHtml(incident.DateUpdated || 'N/A');

                return `
                    <div class="incident-item">
                        <h4>${title}</h4>
                        <p>${description}</p>
                        <div class="incident-meta">Lines: ${lines}</div>
                        <div class="incident-meta">Updated: ${updated}</div>
                    </div>
                `;
            }).join('');
        }

        function renderAccessibilityOutages(outages) {
            if (!outages.length) {
                return '<div class="modal-empty">No active elevator/escalator outages for this station.</div>';
            }

            return outages.map(outage => {
                const unitType = escapeHtml(outage.UnitType || 'Accessibility Unit');
                const location = escapeHtml(outage.LocationDescription || outage.UnitName || 'Location unavailable');
                const details = escapeHtml(outage.SymptomDescription || 'No additional details.');
                const updated = escapeHtml(outage.DateUpdated || outage.DateOutOfServ || 'N/A');
                const estReturn = escapeHtml(outage.EstimatedReturnToService || 'Not provided');

                return `
                    <div class="incident-item outage-item">
                        <h4>${unitType}</h4>
                        <p>${location}</p>
                        <p>${details}</p>
                        <div class="incident-meta">Updated: ${updated}</div>
                        <div class="incident-meta">Estimated return: ${estReturn}</div>
                    </div>
                `;
            }).join('');
        }

        function loadStationIncidents() {
            const content = document.getElementById('incidentsModalContent');
            if (!content) return;

            content.innerHTML = '<div class="loading">Loading incidents...</div>';

            const params = {
                api_key: '5f4edc894c164d6daefa973fb3cbdfdd'
            };

            const stationCode = appState.currentStationCode;
            const stationName = appState.currentStationName;

            const railUrl = `https://api.wmata.com/Incidents.svc/json/Incidents?${objectToQueryString(params)}`;
            const elevatorUrl = `https://api.wmata.com/Incidents.svc/json/ElevatorIncidents?${objectToQueryString(params)}`;

            Promise.all([
                fetch(railUrl).then(response => {
                    if (!response.ok) throw new Error('Failed rail incidents request');
                    return response.json();
                }),
                fetch(elevatorUrl).then(response => {
                    if (!response.ok) throw new Error('Failed elevator incidents request');
                    return response.json();
                })
            ])
            .then(([railData, elevatorData]) => {
                const railIncidents = (railData.Incidents || []).filter(incident =>
                    incidentMatchesStation(incident, stationCode, stationName)
                );

                const outageSource = elevatorData.ElevatorIncidents || elevatorData.Outages || [];
                const outages = outageSource.filter(outage =>
                    incidentMatchesStation(outage, stationCode, stationName)
                );

                content.innerHTML = `
                    <div class="incident-section">
                        <h3>Rail Incidents (${railIncidents.length})</h3>
                        ${renderRailIncidents(railIncidents)}
                    </div>
                    <div class="incident-section">
                        <h3>Elevator/Escalator Outages (${outages.length})</h3>
                        ${renderAccessibilityOutages(outages)}
                    </div>
                `;
            })
            .catch(() => {
                content.innerHTML = '<div class="error-message">Unable to load incidents right now.</div>';
            });
        }

        function updateDateTime() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const year = now.getFullYear();
            
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            //add secods to time display
            const seconds = String(now.getSeconds()).padStart(2, '0');

            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            
            const dateTimeString = `${month}/${day}/${year} ${hours}:${minutes}:${seconds} ${ampm}`;
            
            const dateTimeEl = document.getElementById('datetimeDisplay');
            if (dateTimeEl) {
                dateTimeEl.textContent = dateTimeString;
            }
        }

        function updateLastUpdated() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            const lastUpdatedEl = document.getElementById('lastUpdated');
            if (lastUpdatedEl) {
                lastUpdatedEl.innerHTML = `Last updated: ${timeString}`;
            }
        }
    </script>
